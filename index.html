<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>우주 체험 시뮬레이터</title>
    <link rel="stylesheet" href="./styles.css?v=20260611c" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main id="app">
      <canvas id="space"></canvas>

      <section class="hud hud-left" aria-label="비행 상태">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <h1>Solar Drift</h1>
            <p>태양계 자유 항행</p>
          </div>
        </div>
        <div class="readouts">
          <div>
            <span>속도</span>
            <strong id="speedReadout">0 km/s</strong>
          </div>
          <div>
            <span>가장 가까운 천체</span>
            <strong id="nearestReadout">-</strong>
          </div>
          <div>
            <span>거리</span>
            <strong id="distanceReadout">-</strong>
          </div>
        </div>
        <div class="radar-panel" aria-label="태양계 레이더">
          <div class="radar-head">
            <span>레이더</span>
            <strong id="radarTargetReadout">지구</strong>
          </div>
          <canvas id="radar" width="260" height="260"></canvas>
          <div class="radar-foot">
            <span id="radarRangeReadout">태양계 전체</span>
            <span id="radarDistanceReadout">-</span>
          </div>
        </div>
        <div class="visit-panel" aria-label="방문 로그">
          <div class="visit-head">
            <span>방문 로그</span>
            <strong id="visitCountReadout">0</strong>
          </div>
          <div class="visit-list" id="visitLogList">
            <span class="visit-empty">아직 기록된 방문지가 없습니다.</span>
          </div>
        </div>
      </section>

      <section class="hud hud-right" aria-label="목표 선택">
        <label for="targetSelect">목표</label>
        <select id="targetSelect"></select>
        <div class="control-row">
          <button id="warpButton" type="button" title="선택한 행성 쪽으로 자동 항행">워프</button>
          <button id="orbitButton" type="button" title="선택한 행성 주변에서 관측 궤도로 진입">궤도</button>
          <button id="stopButton" type="button" title="현재 이동 속도를 즉시 줄이고 정지">정지</button>
          <button id="resetButton" type="button" title="지구 근처 시작 지점으로 복귀">초기화</button>
        </div>
        <label class="range-label" for="throttleSlider">
          추진력
          <span id="throttleReadout">35%</span>
        </label>
        <input id="throttleSlider" type="range" min="0" max="100" value="35" />
        <label class="range-label" for="timeScaleSlider">
          시간 배속
          <span id="timeScaleReadout">1x</span>
        </label>
        <input id="timeScaleSlider" type="range" min="0" max="8" step="0.25" value="1" />
        <label class="toggle">
          <input id="labelsToggle" type="checkbox" checked />
          <span>행성 이름</span>
        </label>
        <label class="toggle">
          <input id="trailsToggle" type="checkbox" checked />
          <span>궤도선</span>
        </label>
        <label class="toggle">
          <input id="moonsToggle" type="checkbox" checked />
          <span>위성</span>
        </label>
        <label class="toggle">
          <input id="eventsToggle" type="checkbox" checked />
          <span>랜덤 이벤트</span>
        </label>
      </section>

      <section class="hud help" aria-label="조작 안내">
        <span>A/D 좌우</span>
        <span>E/Q 전후</span>
        <span>W/S 상하</span>
        <span>Shift 가속</span>
        <span>Space 정지</span>
        <span>휠 줌</span>
        <span>좌/우클릭 시점</span>
      </section>

      <a class="credits" href="https://www.solarsystemscope.com/textures/" target="_blank" rel="noreferrer">
        Planet textures: Solar System Scope CC BY 4.0
      </a>

      <section class="hud event-card" id="eventCard" aria-live="polite">
        <span id="eventType">이벤트 대기</span>
        <strong id="eventName">정상 항행</strong>
        <p id="eventInfo">랜덤 이벤트가 켜져 있으면 소행성군이나 블랙홀 조우가 발생합니다.</p>
      </section>

      <section class="hud target-card" id="targetCard" aria-live="polite">
        <span id="targetType">행성</span>
        <strong id="targetName">지구</strong>
        <p id="targetInfo">대기가 푸르게 빛나는 기준 행성입니다.</p>
      </section>

      <div class="reticle" aria-hidden="true"></div>
      <div class="vignette" aria-hidden="true"></div>
      <div class="mobile-controls" aria-label="모바일 비행 조작">
        <button data-fly="forward" type="button">▲</button>
        <div>
          <button data-fly="left" type="button">◀</button>
          <button data-fly="back" type="button">▼</button>
          <button data-fly="right" type="button">▶</button>
        </div>
      </div>
    </main>

    <script type="module" src="./app.js?v=20260612b"></script>
  </body>
</html>
