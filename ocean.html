<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>만화 바다 산책</title>
    <link rel="stylesheet" href="./ocean.css?v=20260613b" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main id="app">
      <canvas id="ocean"></canvas>

      <section class="intro" id="intro">
        <h1>고요한 바다</h1>
        <p>지브리풍 만화 바다를 자유롭게 헤엄치며 둘러보세요.</p>
        <span class="intro-hint">아무 키나 누르거나 화면을 드래그하면 시작합니다</span>
      </section>

      <section class="controls-hint" id="hint" aria-label="조작 안내">
        <span><b>W A S D</b> 헤엄</span>
        <span><b>Space / C</b> 상승·하강</span>
        <span><b>Shift</b> 가속</span>
        <span><b>드래그</b> 시점</span>
        <span><b>휠</b> 줌</span>
        <span><b>R</b> 처음 위치</span>
      </section>

      <div class="depth-vignette" aria-hidden="true"></div>

      <div class="mobile-controls" aria-label="모바일 이동">
        <button data-fly="forward" type="button">▲</button>
        <div>
          <button data-fly="left" type="button">◀</button>
          <button data-fly="back" type="button">▼</button>
          <button data-fly="right" type="button">▶</button>
        </div>
      </div>
    </main>

    <script type="module" src="./ocean.js?v=20260613b"></script>
  </body>
</html>
